            --header "Dropbox-API-Arg: {\"path\": \"/database.db\"}" \
            -o "database.db"
          # ※ \"path\": \"/test.txt\" の部分はDropbox上の実際のパスに書き換えてください。
          # ※ -o "test.txt" は保存するファイル名です。

      # 3. 差分があればGitHubにPushする
      - name: Commit and Push if changed
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # ファイルが新規作成または更新されたか確認
          if [ -n "$(git status --porcelain)" ]; then
            git add .
            git commit -m "Update: Dropbox file sync $(date +'%Y-%m-%d %H:%M')"
            git push
          else
            echo "No changes detected. Skipping push."
          fi
