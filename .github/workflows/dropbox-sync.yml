name: Dropbox to GitHub Sync

# 実行タイミングの設定
on:
  schedule:
    - cron: '0 * * * *' # 1時間に1回自動実行
  workflow_dispatch:     # GitHub上で「Run workflow」ボタンを手動で押せるようにする

jobs:
  sync-job:
    runs-on: ubuntu-latest
    
    # リポジトリへの書き込み権限を許可
    permissions:
      contents: write

    steps:
      # 1. リポジトリのコードをチェックアウト
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Dropboxからファイルをダウンロード
