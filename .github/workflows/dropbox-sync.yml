name: Dropbox to GitHub Sync

# 実行タイミングの設定
on:
  schedule:
    - cron: '0 15 * * 0' # 日本時間の日曜日 00:00（UTCの土曜日 15:00）
  workflow_dispatch:     # GitHub上で「Run workflow」ボタンを手動で押せるようにする

jobs:
  sync-job:
    runs-on: ubuntu-latest
    
    # リポジトリへの書き込み権限を許可
    permissions:
      contents: write

    steps:
      # 1. リポジトリのコードをチェックアウト
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Dropboxからファイルをダウンロード
      - name: Download file from Dropbox
        run: |
          curl -X POST https://content.dropboxapi.com/2/files/download \
            --header "Authorization: Bearer ${{secrets.DROPBOX_ACCESS_TOKEN}}" \
            --header "Dropbox-API-Arg: {\"path\": \"/Apps/DAILY NOTE/database.db\"}" \
            -o "database.db"
          # ※ \"path\": \"/test.txt\" の部分はDropbox上の実際のパスに書き換えてください。
          # ※ -o "test.txt" は保存するファイル名です。

      # 3. 差分があればGitHubにPushする
      - name: Commit and Push if changed
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # ファイルが新規作成または更新されたか確認
          if [ -n "$(git status --porcelain)" ]; then
            git add .
            git commit -m "Update: Dropbox file sync $(date +'%Y-%m-%d %H:%M')"
            git push
          else
            echo "No changes detected. Skipping push."
          fi
