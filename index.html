<!DOCTYPE html>
<html lang="ja">
<head>
  <meta name="robots" content="noindex,nofollow">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Cahier (2016–2026) - nisaki</title>
  <link rel="icon" href="favicon.jpg" type="image/jpeg">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.6.2/sql-wasm.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@1/css/pico.min.css">
  <style>
    :root { 
      --primary: #455a64; 
      --bg-color: #f8fafb;
      --accent: #d1d9e0;
      --card-bg: #ffffff;
    }
    
    html { scroll-padding-top: 50px; scroll-behavior: smooth; }
    body { background-color: var(--bg-color); font-family: -apple-system, sans-serif; margin: 0; padding-top: 40px; }

    /* --- ヘッダー：限界までスリム化 --- */
    #header-bar {
      position: fixed; top: 0; left: 0; width: 100%; height: 40px; 
      display: flex; align-items: center; justify-content: center;
      background: rgba(255, 255, 255, 0.85); z-index: 2100;
      border-bottom: 1px solid #eee; backdrop-filter: blur(10px);
    }
    
    #sidebar-toggle { cursor: pointer; padding: 0 20px; }
    #sidebar-toggle h4 { margin: 0; font-size: 0.75rem; letter-spacing: 0.3em; color: var(--primary); font-weight: 300; }

    /* --- 右下のフローティングボタン群 --- */
    .floating-controls {
      position: fixed; bottom: 25px; right: 25px; 
      display: flex; flex-direction: column; gap: 12px; z-index: 2200;
    }

    /* 共通ボタン設定 */
    .f-btn {
      width: 48px; height: 48px; border-radius: 50%; border: none;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.15); transition: 0.3s;
    }

    #back-to-top {
      background: #fff; color: var(--primary); border: 1px solid var(--accent);
      opacity: 0; visibility: hidden;
    }
    #back-to-top.visible { opacity: 0.9; visibility: visible; }
    #back-to-top::before { content: '▲'; font-size: 0.9rem; }

    #random-btn {
      background: var(--primary); color: #fff;
      font-size: 0.6rem; font-weight: bold; line-height: 1.1; letter-spacing: 0.05em;
    }
    #random-btn:hover, #back-to-top:hover { transform: scale(1.1); opacity: 1; }

    /* --- カレンダーサイドバー --- */
    #sidebar { 
      position: fixed; top: 0; left: 0; width: 100%; height: 0; 
      background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(20px);
      z-index: 2000; overflow: hidden; transition: height 0.4s ease-in-out;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
    }
    #sidebar.open { height: 100vh; }

    .calendar-picker {
      background: #fff; padding: 25px; border-radius: 16px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.1); width: 90%; max-width: 380px;
    }
    .cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .cal-header button { background: none; border: none; color: var(--primary); font-size: 1.2rem; cursor: pointer; width: auto; margin:0; box-shadow: none; }
    .cal-selectors select { 
      width: auto; margin-bottom: 0; font-size: 0.85rem; border-color: #eee; height: 35px;
      background-color: #fff; color: var(--primary); padding: 2px 30px 2px 10px;
    }

    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; text-align: center; }
    .dow { font-size: 0.65rem; color: #999; font-weight: bold; margin-bottom: 8px; }
    .cal-day { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 0.85rem; border-radius: 6px; color: #eee; }
    .cal-day.has-note { background: #f0f4f8; color: var(--primary); font-weight: bold; cursor: pointer; border: 1px solid var(--accent); }
    .cal-day.has-note:hover { background: var(--primary); color: #fff; }

    /* --- メインコンテンツ：余白を最適化 --- */
    main { max-width: 800px; margin: 0 auto; padding: 15px 15px 120px; }
    .search-box { margin-bottom: 20px; text-align: center; }
    #search-input { max-width: 380px; border-radius: 25px; border: 1px solid #ddd; text-align: center; height: 40px; font-size: 0.9rem; }
    
    .month-title { border-bottom: 1px solid #ddd; color: var(--primary); padding-bottom: 3px; font-size: 1rem; margin: 40px 0 20px; text-align: center; font-weight: 300; }
    .note-card { background: var(--card-bg); padding: 30px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.03); margin-bottom: 25px; border-left: 4px solid #eee; }
    .day-label { font-size: 0.7rem; color: #aaa; margin-bottom: 8px; display: block; }
    .note-text { line-height: 1.7; white-space: pre-wrap; font-size: 0.95rem; color: #333; }
    .hidden { display: none !important; }
  </style>
</head>
<body>

  <header id="header-bar">
    <div id="sidebar-toggle"><h4>Cahier</h4></div>
  </header>
  
  <div class="floating-controls">
    <button id="back-to-top" class="f-btn" aria-label="上に戻る"></button>
    <button id="random-btn" class="f-btn">RAN<br>DOM</button>
  </div>

  <nav id="sidebar">
    <div class="calendar-picker">
      <div class="cal-header">
        <button id="prev-month">＜</button>
        <div class="cal-selectors">
          <select id="year-select"></select>
          <select id="month-select">
            <option value="0">1月</option><option value="1">2月</option><option value="2">3月</option>
            <option value="3">4月</option><option value="4">5月</option><option value="5">6月</option>
            <option value="6">7月</option><option value="7">8月</option><option value="8">9月</option>
            <option value="9">10月</option><option value="10">11月</option><option value="11">12月</option>
          </select>
        </div>
        <button id="next-month">＞</button>
      </div>
      <div class="cal-grid" id="calendar-days">
        <div class="dow">S</div><div class="dow">M</div><div class="dow">T</div><div class="dow">W</div><div class="dow">T</div><div class="dow">F</div><div class="dow">S</div>
      </div>
    </div>
  </nav>

  <main>
    <div class="search-box">
      <input type="search" id="search-input" placeholder="Search...">
      <div id="record-count" style="font-size: 0.7rem; color: #999; margin-top: 5px;">0 records</div>
    </div>
    <div id="output"></div>
  </main>

  <script>
    let allDateIds = [];
    let noteDates = new Set();
    let displayDate = new Date();

    const sidebar = document.getElementById('sidebar');
    const toggleBtn = document.getElementById('sidebar-toggle');
    const yearSelect = document.getElementById('year-select');
    const monthSelect = document.getElementById('month-select');
    const backToTop = document.getElementById('back-to-top');

    for (let y = 2016; y <= 2026; y++) {
      let opt = document.createElement('option');
      opt.value = y; opt.innerText = y + "年";
      yearSelect.appendChild(opt);
    }

    function toggleMenu() {
      const isOpen = sidebar.classList.toggle('open');
      document.body.style.overflow = isOpen ? 'hidden' : '';
      if(isOpen) syncSelects();
    }
    toggleBtn.onclick = toggleMenu;

    function syncSelects() {
      yearSelect.value = displayDate.getFullYear();
      monthSelect.value = displayDate.getMonth();
      renderCalendar();
    }

    window.onscroll = () => {
      if (window.scrollY > 300) backToTop.classList.add('visible');
      else backToTop.classList.remove('visible');
    };
    backToTop.onclick = () => window.scrollTo({ top: 0, behavior: 'smooth' });

    document.getElementById('prev-month').onclick = (e) => {
      e.stopPropagation();
      displayDate.setMonth(displayDate.getMonth() - 1);
      syncSelects();
    };
    document.getElementById('next-month').onclick = (e) => {
      e.stopPropagation();
      displayDate.setMonth(displayDate.getMonth() + 1);
      syncSelects();
    };

    yearSelect.onchange = () => { displayDate.setFullYear(yearSelect.value); renderCalendar(); };
    monthSelect.onchange = () => { displayDate.setMonth(monthSelect.value); renderCalendar(); };

    document.getElementById('random-btn').onclick = () => {
      if (allDateIds.length === 0) return;
      const randomId = allDateIds[Math.floor(Math.random() * allDateIds.length)];
      const target = document.getElementById(randomId);
      if (target) {
        if (sidebar.classList.contains('open')) toggleMenu();
        target.scrollIntoView({ behavior: 'smooth', block: 'center' });
        target.style.backgroundColor = "#fffde7";
        setTimeout(() => { target.style.backgroundColor = "#ffffff"; }, 1500);
      }
    };

    function renderCalendar() {
      const grid = document.getElementById('calendar-days');
      grid.querySelectorAll('.cal-day').forEach(d => d.remove());
      const year = displayDate.getFullYear();
      const month = displayDate.getMonth();
      const firstDay = new Date(year, month, 1).getDay();
      const lastDate = new Date(year, month + 1, 0).getDate();

      for (let i = 0; i < firstDay; i++) {
        const spacer = document.createElement('div');
        spacer.className = 'cal-day';
        grid.appendChild(spacer);
      }
      for (let d = 1; d <= lastDate; d++) {
        const dayEl = document.createElement('div');
        dayEl.className = 'cal-day';
        dayEl.innerText = d;
        const dateKey = `${year}-${month + 1}-${d}`;
        if (noteDates.has(dateKey)) {
          dayEl.classList.add('has-note');
          dayEl.onclick = () => {
            const targetId = `date-${year}-${month + 1}-${d}`;
            toggleMenu();
            setTimeout(() => {
              const target = document.getElementById(targetId);
              if(target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }, 100);
          };
        }
        grid.appendChild(dayEl);
      }
    }

    async function init() {
      try {
        const SQL = await initSqlJs({ locateFile: f => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.6.2/${f}` });
        const res = await fetch("database.db?v=" + new Date().getTime());
        const ab = await res.arrayBuffer();
        const db = new SQL.Database(new Uint8Array(ab));
        const rows = db.exec("SELECT day, content, marker_color FROM note ORDER BY day DESC")[0].values;
        const output = document.getElementById("output");
        let currentYM = "";

        rows.forEach(row => {
          let rawD = row[0].trim();
          let norm = rawD.replace(/[０-９]/g, s => String.fromCharCode(s.charCodeAt(0) - 0xFEE0)).replace(/\s+/g, "");
          const m = norm.match(/^(\d{4})[\.\/\-年]*(\d{1,2})[\.\/\-月]*(\d{1,2})?/);
          if (m) {
            const y = m[1], mo = parseInt(m[2]), d = m[3] ? parseInt(m[3]) : null;
            if (d) {
              const dateId = `date-${y}-${mo}-${d}`;
              noteDates.add(`${y}-${mo}-${d}`);
              allDateIds.push(dateId);
              const ym = `${y}.${String(mo).padStart(2, '0')}`;
              if (ym !== currentYM) {
                currentYM = ym;
                const title = document.createElement("div");
                title.className = "month-title"; title.innerText = ym;
                output.appendChild(title);
              }
              const card = document.createElement("div");
              card.id = dateId; card.className = "note-card"; card.style.borderLeftColor = row[2] || "#eee";
              card.innerHTML = `<span class="day-label">${rawD}</span><div class="note-text">${row[1]}</div>`;
              output.appendChild(card);
            }
          }
        });
        document.getElementById('record-count').innerText = `${allDateIds.length} records`;
      } catch (e) { console.error(e); }
    }
    window.onload = init;
  </script>
</body>
</html>
